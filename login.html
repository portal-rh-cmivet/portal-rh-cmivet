<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Portal RH CMIVET</title>

    <link rel="stylesheet" href="app.css">

</head>

<body class="login-body">

    <main class="login-layout">

        <section class="login-visual">

            <div>

                <span class="pill">
                    Portal RH CMIVET
                </span>

                <h1>
                    Cuidamos de vidas.<br>
                    Valorizamos pessoas.
                </h1>

            </div>

        </section>

        <section class="login-panel">

            <form id="loginForm" class="login-card">

                <img
                    src="assets/cmivet-logo-oficial.jpeg"
                    alt="CMIVET">

                <h2>
                    Entrar no Portal RH
                </h2>

                <label>

                    E-mail

                    <input
                        type="email"
                        name="email"
                        required>

                </label>

                <label>

                    Senha

                    <input
                        type="password"
                        name="senha"
                        required>

                </label>

                <button
                    class="btn primary"
                    type="submit">

                    Entrar

                </button>

                <div
                    id="loginMessage"
                    class="message">
                </div>

                <a href="index.html">

                    ← Voltar à página principal

                </a>

            </form>

        </section>

    </main>

    <!-- Configuração -->

    <script src="js/config.js"></script>

    <!-- Comunicação com Apps Script -->

    <script src="js/api.js"></script>

    <!-- Sessão -->

    <script src="js/session.js"></script>

    <!-- Autenticação -->

    <script src="js/auth.js"></script>

    <!-- Controle da tela -->

    <script src="js/login.js"></script>

</body>

</html>
