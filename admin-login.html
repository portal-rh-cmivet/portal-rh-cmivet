<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login Administrativo | CMIVET</title><link rel="stylesheet" href="sprint11.css"></head><body>
<div class="login-page"><form id="loginForm" class="login-card"><img src="assets/cmivet-logo-oficial.jpeg" alt="CMIVET"><span class="daily-tag">Acesso restrito</span><h1>Administração RH</h1><p>Informe seu e-mail e senha.</p><label>E-mail<input type="email" name="email" required></label><label>Senha<input type="password" name="senha" required></label><button type="submit">Entrar</button><div id="loginError" class="error"></div><a href="index.html">← Voltar ao Portal</a></form></div>
<style>.login-page{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,#083f39,#0f6258)}.login-card{width:min(440px,100%);background:#fff;border-radius:18px;padding:28px;display:grid;gap:13px;box-shadow:0 25px 70px rgba(0,0,0,.3)}.login-card img{width:150px;height:80px;object-fit:contain;margin:auto}.login-card h1,.login-card p{text-align:center;margin:0}.login-card p{color:#6c7773}.login-card label{display:grid;gap:5px;font-weight:800}.login-card input{padding:11px;border:1px solid #e7dcc1;border-radius:9px}.login-card button{border:0;border-radius:9px;padding:12px;background:#0f6258;color:#fff;font-weight:900}.login-card a{text-align:center;color:#0f6258;text-decoration:none}</style><script src="admin-auth.js"></script></body></html>
