<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Usuários e Acessos | CMIVET</title><link rel="stylesheet" href="sprint11.css"></head><body>
<div class="users-page"><header><div><small>ADMINISTRAÇÃO RH CMIVET</small><h1>Usuários e Acessos</h1></div><button id="logout">Sair</button></header>
<div class="users-grid"><section class="panel"><div class="panel-head"><div><h3>Novo usuário</h3><p>Cadastre o acesso e o perfil.</p></div></div><form id="userForm" class="user-form"><label>Nome<input name="nome" required></label><label>E-mail de acesso<input type="email" name="email" required></label><div class="form-row"><label>Cargo<input name="cargo"></label><label>Setor<input name="setor"></label></div><div class="form-row"><label>Gestor<input name="gestor"></label><label>Perfil<select name="perfil"><option value="colaborador">Colaborador</option><option value="gestor">Gestor</option><option value="diretoria">Diretoria</option><option value="admin">Administrador RH</option></select></label></div><label>Senha inicial<input type="password" name="senha" minlength="8" required></label><button type="submit">Cadastrar usuário</button><div id="userMessage"></div></form></section>
<section class="panel"><div class="panel-head"><div><h3>Usuários cadastrados</h3><p>Ative, bloqueie ou consulte os acessos.</p></div></div><div id="usersList" class="users-list"></div></section></div></div>
<style>.users-page{padding:24px;min-height:100vh}.users-page header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.users-page header h1{margin:3px 0}.users-page header small{color:#0f6258;font-weight:900}.users-page header button{border:0;background:#0f6258;color:#fff;border-radius:9px;padding:10px 15px}.users-grid{display:grid;grid-template-columns:.8fr 1.2fr;gap:18px}.user-form{padding:19px;display:grid;gap:13px}.user-form label{display:grid;gap:5px;font-weight:800}.user-form input,.user-form select{padding:10px;border:1px solid #e7dcc1;border-radius:9px}.user-form button{border:0;background:#0f6258;color:#fff;border-radius:9px;padding:12px;font-weight:900}.users-list{padding:17px;display:grid;gap:10px}.user-card{border:1px solid #e7dcc1;border-radius:11px;padding:13px}.user-card h4{margin:0 0 5px}.user-card p{margin:0;color:#6c7773}.user-card .badge{margin-top:8px}@media(max-width:850px){.users-grid{grid-template-columns:1fr}}</style><script src="usuarios.js"></script></body></html>
